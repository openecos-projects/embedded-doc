INHERIT: tpl/cfg/mkdocs_base.yml

docs_dir: src/zh
site_dir: site

site_name: ECOS嵌入式
site_url: !ENV READTHEDOCS_CANONICAL_URL

edit_uri: edit/main/doc/src/zh

repo_url: https://github.com/openecos-projects/embedded-doc
repo_name: openecos-projects/embedded-doc

theme:
  palette:
  - scheme: default
    primary: blue
    accent: blue
    toggle:
      icon: material/brightness-7
      name: 切换到深色模式
  - scheme: slate
    primary: blue
    accent: blue
    toggle:
      icon: material/brightness-4
      name: 切换到浅色模式
  language: zh

extra:
  alternate:

nav:
  - 项目主页: index.md
  - 板卡百科:
    - page/brd/index.md
    - 星空L:
      - page/brd/starry-sky-l/index.md
      - v1.2（一生一芯三期）: page/brd/starry-sky-l/v1.2.md
      - v1.3（一生一芯三期）: page/brd/starry-sky-l/v1.3.md
      - v2.1（一生一芯四期）: page/brd/starry-sky-l/v2.1.md
      - v3.0（一生一芯五期）: page/brd/starry-sky-l/v3.0.md
      - v3.1（一生一芯五期）: page/brd/starry-sky-l/v3.1.md
    - 星空C:
      - page/brd/starry-sky-c/index.md
      - v1.0: page/brd/starry-sky-c/v1.0.md
      - v2.0 Pico: page/brd/starry-sky-c/v2.0_pico.md
      - v2.0 Pi: page/brd/starry-sky-c/v2.0_pi.md
  - SDK:
    - 版本简介: page/sdk/index.md
    - 通用:
      - 环境准备: page/sdk/common/env.md
      - 快速上手: page/sdk/common/quickstart.md
    - SDK 1.0:
      - API文档:
        - GPIO: page/sdk/v1.0/gpio.md
        - QSPI: page/sdk/v1.0/qspi.md
        - PWM: page/sdk/v1.0/pwm.md
        - HP_UART: page/sdk/v1.0/hp_uart.md
        - I2C: page/sdk/v1.0/i2c.md
        - SYS_UART: page/sdk/v1.0/sys_uart.md
        - TIMER: page/sdk/v1.0/timer.md
        - LIBC: page/sdk/v1.0/libc.md
        - LIBGCC: page/sdk/v1.0/libgcc.md
      - 示例工程:
        - Hello World: page/sdk/v1.0/hello_world.md
    - SDK 2.0:
      - API文档:
        - GPIO: page/sdk/v2.0/gpio_v2.md
        - HP_UART: page/sdk/v2.0/hp_uart_v2.md
        - SYS_UART: page/sdk/v2.0/sys_uart_v2.md
